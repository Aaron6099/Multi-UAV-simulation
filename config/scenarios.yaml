# ============================================================================
# scenarios.yaml — 多工况稳定性测试的【单一真值源】 / single source of truth
# ----------------------------------------------------------------------------
# 谁读它:
#   tools/gen_spawn.py            → 生成 start_N_px4.sh 的 PX4 出生 POSES(ENU)
#   launch/swarm_launch.py (P1后续) → BIRTH_*/OFFSETS_*/NBR_*/COMMON 由此注入
#   tools/verdict.py (P3)          → 用 thresholds 自动判 PASS/FAIL
#
# 坐标: birth / offsets 一律 世界系 NED = [North, East, Down]（Down 通常 0）。
#       Gazebo ENU 换算只在 gen_spawn 里做一次: ENU=(East,North)=(NED[1],NED[0])。
#
# ⚠️ 改了 formations.*.birth 后，务必重生成 start_N 出生点，别手改脚本：
#       py tools/gen_spawn.py --formation cross5         # 看/贴 POSES
#       py tools/gen_spawn.py --validate                 # 校验与现有脚本一致
# ============================================================================

# ── 公共参数（= swarm_launch.py 的 COMMON）；scenario.limits 可覆盖安全相关项 ──
defaults:
  target_alt:               -5.0    # NED，负=向上，-5 → 离地 5 m
  max_speed:                 3.0
  max_climb:                 1.5
  max_accel:                 4.0
  control_hz:               50.0
  neighbour_timeout:         2.0
  startup_zero_vel_frames:   100
  calib_settle_frames:        25
  mpc_horizon:                30
  mpc_dt:                   0.05
  q_pos:                     4.0
  q_vel:                     2.0
  r_acc:                     0.1
  q_pos_terminal_scale:      2.0
  d_safe:                    1.5
  w_collision:             200.0
  w_formation:               0.5
  vel_xy_kp:                 0.0    # 候选①：XY 位置反馈增益。0=纯前馈(现状)；>0 开有界 P 防发散
  vel_xy_cap:                0.8    # 位置纠偏限幅 m/s，防无阻尼圆周震荡
  # SITL 三机同一 Gazebo 地面：关闭 alt 跨机校准。各机 EKF 的 ref_alt(GPS海拔基准)
  # 差 1-1.5m 纯属仿真噪声，非真实高度差；开着会让各机飞到不同物理高度(高度参差)。
  # 关闭后各机 world_birth_z=birth_z=0，各自控到离地 target_alt，三机同高。
  # （真机各机 home 海拔可能真不同，部署时再设 true）
  alt_sync_enable:          false
  alt_resync_enable:        false
  acados_build_dir: /tmp/acados_di_mpc

# ── 队形几何：标准出生点 birth(NED) + 邻居 + 队形偏移 offsets ──────────────────
# 取代 swarm_launch.py 里硬编码的 BIRTH_*/OFFSETS_*/NBR_*。offsets 省略 = 同 birth。
formations:
  solo1:
    birth:      [[0, 0, 0]]
    neighbours: [[0]]

  pair2:                                    # 前后纵列，间距 3 m
    birth:      [[0, 0, 0], [-3, 0, 0]]
    neighbours: [[1], [0]]

  trio3:                                    # 等边三角形，外接圆 R=3，边长≈5.196
    birth:      [[3, 0, 0], [-1.5, 2.598, 0], [-1.5, -2.598, 0]]
    neighbours: [[1, 2], [0, 2], [0, 1]]

  cross5:                                   # 十字：出生即队形
    birth:      [[0, 0, 0], [0, 3, 0], [0, -3, 0], [3, 0, 0], [-3, 0, 0]]
    neighbours: [[1, 2, 3, 4], [0], [0], [0], [0]]

  star5:                                    # 出生=十字(同 cross5)，队形=五边形
    birth:      [[0, 0, 0], [0, 3, 0], [0, -3, 0], [3, 0, 0], [-3, 0, 0]]
    # offsets 按最近出生点分配槽位，消除收敛路径交叉（旧方案 d2/d3 交叉导致碰撞）:
    #   d0(0,0)→SW(-2.427,-1.763)  d1(0,3)→NE(0.927,2.853)  d2(0,-3)→NW(0.927,-2.853)
    #   d3(3,0)→N(3,0) 0m不动       d4(-3,0)→SE(-2.427,1.763)
    offsets:    [[-2.427, -1.763, 0], [0.927, 2.853, 0], [0.927, -2.853, 0],
                 [3, 0, 0], [-2.427, 1.763, 0]]
    # pentagon 环顺序: d3(N)-d1(NE)-d4(SE)-d0(SW)-d2(NW)-d3
    neighbours: [[4, 2], [3, 4], [0, 3], [1, 2], [1, 0]]

  grid9:                                    # 3×3 方阵：出生即队形
    birth:      [[0, 0, 0], [0, 3, 0], [0, -3, 0], [3, 0, 0], [-3, 0, 0],
                 [3, 3, 0], [-3, 3, 0], [3, -3, 0], [-3, -3, 0]]
    neighbours: [[1, 2, 3, 4], [0, 5, 6], [0, 7, 8], [0, 5, 7], [0, 6, 8],
                 [1, 3], [1, 4], [2, 3], [2, 4]]

# ── 命名测试工况：选 formation + 覆盖旋钮。对应报告 RUN_PLAN 的 S1–S14 ─────────
# 可覆盖项：
#   leader:  {mode: hover|line|circle, speed, radius, max_distance, yaw_mode: fixed|center|tangent}
#   limits:  {max_speed, max_accel, d_safe, neighbour_timeout}   # 保守限幅 + 阈值调参
#   faults:  {kill_drone, kill_at_s, comms_delay_ms, comms_dropout}  # 故障注入(P2)
#   birth_override: [[N,E,D],...]    # 扰动出生(需 gen_spawn 重生成 spawn)
#   offsets_scale:  <float>          # 整体缩放队形(改间距/尺度)
#   duration_s:     <int>            # 建议运行时长
#   thresholds:     {...}            # 覆盖默认判定阈值
scenarios:
  # ── CORE（建议必跑，支撑报告主体）──
  S0_solo1_hover:   {formation: solo1,  leader: {mode: hover}}
  S0_solo1_circle:  {formation: solo1,  leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center},
                    limits: {safety_max_track_dist: 15.0}}
  S1_solo1_line:    {formation: solo1,  leader: {mode: line,   speed: 1.0, max_distance: 20.0, yaw_mode: tangent}}
  S2_pair2_line:    {formation: pair2,  leader: {mode: line,   speed: 0.5, max_distance: 20.0}}
  S2_pair2_hover:   {formation: pair2,  leader: {mode: hover}}
  S3_trio3_hover:   {formation: trio3,  leader: {mode: hover}}
  S3_trio3_line:    {formation: trio3,  leader: {mode: line,   speed: 0.5, max_distance: 20.0}}
  S3_trio3_circle:  {formation: trio3,  leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}}
  # +ready_hold 缓冲入轨：先静止把队形收敛到 pos_err<0.3 再走圆周，消除起步"边追边成型"畸变
  # (朴素 S3 实测起步瞬态间距掉 0.58m/3违规)。wf 保持默认 0.5——6-09 扫描确认 wf≤0.1 全失稳，
  # 唯一稳定点 v1.5 wf0.5。报告 S3 主结果用此版。
  S3_trio3_circle_rh: {formation: trio3, leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center, ready_hold: 20.0, ready_pos_err: 0.3}}
  S3_trio3_circle_v2: {formation: trio3, leader: {mode: circle, speed: 2.0, radius: 10.0, yaw_mode: center}}  # 速度应力(wf=默认0.5)，扫描 2x3 网格的角
  S3_trio3_circle_wf01: {formation: trio3, leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center},
                          limits: {w_formation: 0.1}}
  S3_trio3_circle_wf01_v2: {formation: trio3, leader: {mode: circle, speed: 2.0, radius: 10.0, yaw_mode: center},
                              limits: {w_formation: 0.1}}
  S3_trio3_circle_wf005: {formation: trio3, leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center},
                           limits: {w_formation: 0.05}}
  S3_trio3_circle_wf005_v2: {formation: trio3, leader: {mode: circle, speed: 2.0, radius: 10.0, yaw_mode: center},
                               limits: {w_formation: 0.05}}
  S4_cross5_line:   {formation: cross5, leader: {mode: line,   speed: 1.0, max_distance: 20.0, ready_hold: 30.0, ready_pos_err: 0.3}}
  # 入轨防撞+缓冲：speed 1.5→1.0(减小入轨角加速度)、ready_hold 30s 先成型再走、
  # w_collision 200→500(碰撞软壁加硬，迫使中心机优先避撞而非保队形)。
  # 实测入轨 min_spacing 2.87m、0 违规、0 fallback（修复前中心-臂曾掉到 0.03m）。
  S5_cross5_circle: {formation: cross5, leader: {mode: circle, speed: 1.0, radius: 10.0, yaw_mode: center, ready_hold: 30.0, ready_pos_err: 0.3}, limits: {w_collision: 500.0}}
  S6_cross5_hover:  {formation: cross5, leader: {mode: hover}}
  S7_grid9_hover:   {formation: grid9,  leader: {mode: hover}}
  S7_grid9_line:    {formation: grid9,  leader: {mode: line,   speed: 0.5, max_distance: 12.0, ready_hold: 30.0, ready_pos_err: 0.3},
                     thresholds: {solve_ms: 15.0}}
  S8_grid9_circle:  {formation: grid9,  leader: {mode: circle, speed: 0.5, radius: 10.0, yaw_mode: center, ready_hold: 30.0, ready_pos_err: 0.3},
                     thresholds: {solve_ms: 15.0}, limits: {safety_max_track_dist: 25.0, w_collision: 200.0, alt_resync_enable: false, vel_xy_kp: 0.5, vel_xy_cap: 0.8, alt_trim_enable: true}}

  # ── EXT（扫自变量，加强稳定性论证）──
  S9_star5_line:    {formation: star5,  leader: {mode: line,   speed: 1.0, max_distance: 20.0}}

  S10_cross5_line_fast:                     # 速度应力：看限幅边界
    formation: cross5
    leader: {mode: line, speed: 2.5, max_distance: 30.0}

  S11_cross5_perturbed:                     # 出生点扰动：从打乱初值收敛(两两已 > d_safe)
    formation: cross5
    birth_override: [[1.0, 0.8, 0], [0.5, 3.4, 0], [-0.7, -2.6, 0],
                     [3.5, -0.6, 0], [-3.5, -0.8, 0]]
    # d4: (-2.8,+0.9)→(-3.5,-0.8): 旧值偏东与 d0 同 Y 侧，收敛+追踪期均易近撞；新值偏西南
    leader: {mode: line, speed: 1.0, max_distance: 20.0, ready_hold: 30.0, ready_pos_err: 0.8}
    limits:
      safety_max_track_dist: 12.0         # 打乱出生→初始 track_err 大，放宽围栏
      w_collision: 400.0                  # 加重碰撞软约束，防追踪超调期 d0/d4 近撞

  S12_cross5_wide:                          # 加宽间距 3→5 m
    formation: cross5
    offsets_scale: 1.6667
    leader: {mode: line, speed: 1.0, max_distance: 20.0}

  S13_cross5_circle_10min:                  # 长时漂移
    formation: cross5
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}
    duration_s: 600

  # ── 降级三件套（故障注入 / 保守限幅 / 阈值调参）──
  S14_cross5_killnode:                      # 故障注入：稳定后杀 drone1，看降级悬停+间距
    formation: cross5
    leader: {mode: line, speed: 1.0, max_distance: 20.0}
    faults: {kill_drone: 1, kill_at_s: 30}

  S15_cross5_conservative:                  # 保守限幅：逼近真机参数
    formation: cross5
    leader: {mode: line, speed: 1.0, max_distance: 20.0}
    limits: {max_speed: 1.5, max_accel: 2.0, d_safe: 2.5}

  S16_cross5_commsdrop:                     # 通信劣化注入：邻居预测延时+丢包
    formation: cross5
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}
    faults: {comms_delay_ms: 200, comms_dropout: 0.2}

  # ── pair2 / trio3 扰动 + 速度应力 ──────────────────────────────────────────
  S17_pair2_perturbed:                      # 双机出生扰动
    formation: pair2
    birth_override: [[0.5, 0.3, 0], [-2.7, -0.4, 0]]
    leader: {mode: line, speed: 0.5, max_distance: 20.0}

  S18_pair2_wide:                           # 双机间距加宽 3→5 m
    formation: pair2
    offsets_scale: 1.6667
    leader: {mode: line, speed: 0.5, max_distance: 20.0}

  S19_trio3_perturbed:                      # 三机出生扰动（先成型再走圆周）
    formation: trio3
    birth_override: [[3.3, 0.5, 0], [-1.2, 2.8, 0], [-1.8, -2.3, 0]]
    # ready_hold 20s: 三机静止悬停下把队形畸变收敛到位(pos_err<0.3)再开圆周，
    # 消除入轨期"边追边成型"的畸变(实测入轨期畸变峰值8.8m)。
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center,
             ready_hold: 20.0, ready_pos_err: 0.3}
    # w_formation 0.05: 圆周跟踪最优(越小越圆; 0.2会向心离心震荡)。失控由
    # EKF reset cap(mpc_node)根治。
    limits: {w_formation: 0.05}

  S20_pair2_line_d10:                       # 双机直线 近目标 max_distance=10
    formation: pair2
    leader: {mode: line, speed: 0.5, max_distance: 10.0}

  S21_pair2_line_d30:                       # 双机直线 远目标 max_distance=30
    formation: pair2
    leader: {mode: line, speed: 0.5, max_distance: 30.0}

  S22_trio3_wide:                           # 三机间距加宽 3→5 m（offsets_scale=5/3≈1.6667）
    formation: trio3
    offsets_scale: 1.6667
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}

  # ── 真机部署门槛（pair2/trio3 的 P2 三件套，对应 S14–S16 的 cross5 版）──────
  S23_pair2_killnode:                       # 双机杀一机：剩余机应稳定悬停不受扰
    formation: pair2
    leader: {mode: line, speed: 0.5, max_distance: 20.0}
    faults: {kill_drone: 1, kill_at_s: 30}

  S24_trio3_killnode:                       # 三机圆周中杀一机：余两机维持跟踪+间距
    formation: trio3
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center,
             ready_hold: 20.0, ready_pos_err: 0.3}
    faults: {kill_drone: 1, kill_at_s: 45}

  S25_trio3_commsdrop:                      # 三机通信劣化：200ms 延迟 + 20% 丢包
    formation: trio3
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center,
             ready_hold: 20.0, ready_pos_err: 0.3}
    faults: {comms_delay_ms: 200, comms_dropout: 0.2}

  S26_trio3_conservative:                   # 三机保守限幅：逼近真机参数
    formation: trio3
    leader: {mode: circle, speed: 1.0, radius: 10.0, yaw_mode: center,
             ready_hold: 20.0, ready_pos_err: 0.3}
    limits: {max_speed: 1.5, max_accel: 2.0, d_safe: 2.5}

  # ══ S27+ safety_filter SITL 回归·诱发场景（真机门禁，配套 report/safety_filter_SITL回归清单.md）══
  # 共性说明：
  #  · 诱发类场景 verdict 预期不按常规 PASS 判（thresholds 已放宽），判定以节点日志
  #    `SAFETY <state> <reasons>` + analyze_flight 轨迹为准；清单里写了每场景的预期日志。
  #  · safety_* 参数在 mpc_node 构造时读一次 → 改本文件后必须 colcon build 才生效。
  #  · ⚠️ 碰撞地板检查不受 grace 门控：诱发碰撞保护时 d_emergency/d_warn 必须 < 出生间距，
  #    否则飞机在地面就 HOLD→RELINQUISH、起飞锁死（清单原“抬 d_emergency 到 5.5”法不可用，
  #    这里改用 offsets_scale 缩小空中队形目标制造真实接近）。

  S27_solo1_fence_line:                     # 飞散围栏·追线诱发（Phase1 第1行）
    formation: solo1
    leader: {mode: line, speed: 1.0, max_distance: 20.0, yaw_mode: tangent}
    # 0.3m 压到稳态滞后以下保证触发。追线时机头速度指向参考点(v_out<0)，按 safety_filter
    # 代码只会给 severity1 → 预期停在 DEGRADED 半速追、不升级 RELINQUISH；
    # 预期日志: flyaway_near/flyaway_converging + SAFETY DEGRADED；leader 到头停走后
    # 应观察到 ok_streak 达 clear_frames 回 NORMAL（迟滞降级闭环）。
    limits: {safety_max_track_dist: 0.3}
    thresholds: {pos_err: 99.0, total_fallbacks: 99999}

  S28_solo1_fence_circle:                   # 飞散围栏·圆周诱发（径向滞后触 breach 刹车）
    formation: solo1
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}
    # 圆周入轨/跟踪径向滞后远超 1m（S0 同场景须放围栏到 15 才不触发）→ 必然越界；
    # 圆周中 v_out 周期性 >0 → 预期日志: flyaway_breach(刹外扩分量) 混 flyaway_converging，
    # 可能间歇 HOLD。观察轨迹被“拽住”不外飞。
    limits: {safety_max_track_dist: 1.0}
    thresholds: {pos_err: 99.0, total_fallbacks: 99999}

  S29_trio3_squeeze_warn:                   # 碰撞地板·真实接近（d_warn 带内均衡，Phase1 第3行）
    formation: trio3
    leader: {mode: hover}
    # 出生间距不变(5.196m，起飞不锁死)；空中队形目标缩到 5.196*0.35≈1.82m，
    # 落在 d_warn=2.0 与 d_emergency=1.2 之间 → 持续 collide_warn 抑制接近+排斥。
    # 预期: 均衡间距 ≈ d_warn 附近(1.9~2.1m)，min spacing 全程 > d_emergency=1.2，
    # 无 collide_emerg 日志；状态 DEGRADED 持续（severity1）。
    offsets_scale: 0.35
    thresholds: {min_spacing: 1.3, pos_err: 99.0, total_fallbacks: 99999}

  S30_trio3_squeeze_emerg:                  # 碰撞地板·emerg 全停 + 多机同时 RELINQUISH（Phase1 第2行替代法 + Phase2 互不连累）
    formation: trio3
    leader: {mode: hover}
    # d_emergency 抬到 2.2（< 出生间距 5.196 不锁死；> 队形目标 1.82 必触发）→ d_warn=2.7。
    # 预期: 收敛进 2.7 先 collide_warn，进 2.2 collide_emerg 横向全停(severity2)
    # → HOLD → ~1s → RELINQUISH（三机可能同时）。min spacing 冻结在 ≈2.1~2.2，绝不 <1.9。
    # 顺带观察: 多机 RELINQUISH 互不连累 + PX4 是否接管（同 S31 的链路问题）。
    offsets_scale: 0.35
    limits: {safety_d_emergency: 2.2}
    thresholds: {min_spacing: 1.9, pos_err: 99.0, total_fallbacks: 99999}

  S31_solo1_relinquish_alt:                 # 🔴 RELINQUISH→PX4 接管链·确定性诱发（放飞门槛第3条）
    formation: solo1
    leader: {mode: hover}
    # max_alt=3.0 < target_alt=5.0 → 爬升越 3m 后 fence_alt_high 压帽(severity2 持续)
    # → HOLD(零速悬停~3m) → 1s → RELINQUISH 停发 setpoint。
    # ⚠️ 前提: 先按 report/真机安全配置清单_FC.md 在 SITL PX4 配 COM_OF_LOSS_T/COM_OBL_RC_ACT，
    #    QGC 肉眼确认 PX4 切 Hold/Land —— 这一步是清单头号门禁。
    # ⚠️ 代码级预判(2026-07-03 读码): RELINQUISH 后 mpc_node 仍每帧发 OffboardControlMode
    #    心跳(control_loop 首行)，且 5s 冷却期内继续发零速 setpoint —— COM_OF_LOSS_T 很可能
    #    永不触发、PX4 不接管（等效无限零速 HOLD 而非交还）。若实测确认，须先决策 relinquish
    #    语义（真停流·放弃自动恢复 vs 主动发 DO_SET_MODE Hold/Land）再上真机。
    limits: {safety_max_alt: 3.0}
    thresholds: {pos_err: 99.0, total_fallbacks: 99999}

  S32_solo1_circle_nosafety:                # Phase0 A/B 基线：safety 关，与 S0_solo1_circle 对比
    formation: solo1
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}
    limits: {safety_filter_enable: false}

  S33_trio3_circle_nosafety:                # Phase0 A/B 基线：safety 关，与 S3_trio3_circle 对比
    formation: trio3
    leader: {mode: circle, speed: 1.5, radius: 10.0, yaw_mode: center}
    limits: {safety_filter_enable: false}

# ── 默认判定阈值（verdict.py 用；scenario.thresholds 可逐项覆盖）──────────────
thresholds:
  min_spacing:        1.8     # 全程最小间距 > 1.8 m（< d_safe=1.5 为危险）
  pos_err:            0.5     # 成型后各机跟踪误差 < 0.5 m
  solve_ms:          12.0     # 单帧最大求解 < 12 ms（grid9 放宽 15）
  safety_violations:    0     # 间距 < 1.5 m 累计帧 = 0
  total_fallbacks:      0     # 降级悬停累计 = 0
